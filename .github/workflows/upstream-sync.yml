name: Upstream Sync Monitor

on:
  schedule:
    - cron: '0 9 * * 1' # Monday 9am UTC
  workflow_dispatch:

permissions:
  issues: write
  contents: write

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Load last synced version
        id: last-version
        run: |
          if [ -f .github/upstream-version.txt ]; then
            echo "version=$(cat .github/upstream-version.txt)" >> "$GITHUB_OUTPUT"
          else
            echo "version=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch latest upstream release
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE=$(gh api repos/bmad-code-org/BMAD-METHOD/releases/latest --jq '.tag_name')
          echo "tag=$RELEASE" >> "$GITHUB_OUTPUT"
          echo "Latest upstream release: $RELEASE"

      - name: Check if new version
        id: check
        env:
          LAST_VERSION: ${{ steps.last-version.outputs.version }}
          UPSTREAM_TAG: ${{ steps.upstream.outputs.tag }}
        run: |
          if [ "$LAST_VERSION" = "$UPSTREAM_TAG" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No new release. Current: $LAST_VERSION"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "New release detected: $UPSTREAM_TAG (previous: $LAST_VERSION)"
          fi

      - name: Check for duplicate issue
        if: steps.check.outputs.skip == 'false'
        id: duplicate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_TAG: ${{ steps.upstream.outputs.tag }}
        run: |
          EXISTING=$(gh issue list --label upstream-sync --search "$UPSTREAM_TAG" --state open --json number --jq 'length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "duplicate=true" >> "$GITHUB_OUTPUT"
            echo "Issue already exists for $UPSTREAM_TAG"
          else
            echo "duplicate=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create notification issue
        if: steps.check.outputs.skip == 'false' && steps.duplicate.outputs.duplicate == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_TAG: ${{ steps.upstream.outputs.tag }}
          LAST_VERSION: ${{ steps.last-version.outputs.version }}
        run: |
          gh label create upstream-sync --description "Upstream BMAD-METHOD sync notification" --color "0075ca" 2>/dev/null || true
          gh issue create \
            --title "sync: upstream BMAD-METHOD $UPSTREAM_TAG released" \
            --body "## Upstream BMAD-METHOD $UPSTREAM_TAG

          A new upstream release has been detected.

          **Release**: [$UPSTREAM_TAG](https://github.com/bmad-code-org/BMAD-METHOD/releases/tag/$UPSTREAM_TAG)
          **Previous synced version**: $LAST_VERSION

          ### Next Steps

          1. Review the [release notes](https://github.com/bmad-code-org/BMAD-METHOD/releases/tag/$UPSTREAM_TAG)
          2. Evaluate changes relevant to this plugin
          3. Close this issue when review is complete" \
            --label upstream-sync

      - name: Update version file
        if: steps.check.outputs.skip == 'false'
        env:
          UPSTREAM_TAG: ${{ steps.upstream.outputs.tag }}
        run: |
          echo "$UPSTREAM_TAG" > .github/upstream-version.txt

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/upstream-version.txt
          git diff --cached --quiet || git commit -m "chore: update upstream sync state to $UPSTREAM_TAG"
          git push
